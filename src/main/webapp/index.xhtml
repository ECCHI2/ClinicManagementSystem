<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Medimanage | Dashboard</ui:define>

    <ui:define name="custom_css">
        <style>
            .stat-card { border: none; border-radius: 20px; transition: transform 0.3s; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
            .stat-card:hover { transform: translateY(-10px); }
            .icon-box { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
            .bg-teal-light { background-color: rgba(20, 184, 166, 0.1); color: #0d9488; }
            .bg-blue-light { background-color: rgba(59, 130, 246, 0.1); color: #2563eb; }
            .bg-purple-light { background-color: rgba(139, 92, 246, 0.1); color: #7c3aed; }
            .nav-card { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; text-decoration: none; color: #1e293b; display: block; transition: all 0.2s; }
            .nav-card:hover { border-color: #0d9488; background: #f0fdfa; }
            .hover-card { transition: transform 0.3s, box-shadow 0.3s; }
            .hover-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; border: 1px solid #e2e8f0 !important; }
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container">
            <h2 class="fw-bold mb-4 text-dark">Hoş Geldiniz, <small class="text-muted">Sistem Özetiniz</small></h2>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-teal-light me-3"><i class="fas fa-user-md"></i></div>
                            <div>
                                <h6 class="text-muted mb-0">Toplam Doktor</h6>
                                <h3 class="fw-bold mb-0">#{dashboardBean.totalDoctors}</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-blue-light me-3"><i class="fas fa-user-injured"></i></div>
                            <div>
                                <h6 class="text-muted mb-0">Toplam Hasta</h6>
                                <h3 class="fw-bold mb-0">#{dashboardBean.totalPatients}</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-purple-light me-3"><i class="fas fa-calendar-check"></i></div>
                            <div>
                                <h6 class="text-muted mb-0">Toplam Randevu</h6>
                                <h3 class="fw-bold mb-0">#{dashboardBean.totalAppointments}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <h5 class="fw-bold mb-3">Hızlı İşlemler</h5>

            <div class="row g-3 mb-3">
                <h:panelGroup rendered="#{loginBean.admin}" layout="block" class="col-md-4">
                    <h:link outcome="doctor" styleClass="nav-card shadow-sm text-center">
                        <i class="fas fa-user-md d-block mb-2 fs-3 text-teal" style="color: #0d9488;"></i>
                        <span>Doktor Yönetimi</span>
                    </h:link>
                </h:panelGroup>

                <div class="col-md-4">
                    <h:link outcome="patient" styleClass="nav-card shadow-sm text-center">
                        <i class="fas fa-user-plus d-block mb-2 fs-3 text-teal" style="color: #0d9488;"></i>
                        <span>Hasta Kayıt</span>
                    </h:link>
                </div>
                <div class="col-md-4">
                    <h:link outcome="appointment" styleClass="nav-card shadow-sm text-center">
                        <i class="fas fa-calendar-alt d-block mb-2 fs-3 text-teal" style="color: #0d9488;"></i>
                        <span>Randevu Sistemi</span>
                    </h:link>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <h:link outcome="laboratory" styleClass="text-decoration-none">
                        <div class="card text-center shadow-sm p-4 h-100 border-0 rounded-3 hover-card">
                            <i class="fas fa-flask fa-2x mb-3" style="color: #f59e0b;"></i>
                            <h6 class="fw-bold text-dark">Laboratuvar</h6>
                        </div>
                    </h:link>
                </div>

                <div class="col-md-6">
                    <h:link outcome="shift" styleClass="text-decoration-none">
                        <div class="card text-center shadow-sm p-4 h-100 border-0 rounded-3 hover-card">
                            <i class="fas fa-moon fa-2x mb-3" style="color: #6366f1;"></i>
                            <h6 class="fw-bold text-dark">Nöbet Çizelgesi</h6>
                        </div>
                    </h:link>
                </div>
            </div>

        </div>
    </ui:define>
</ui:composition>
