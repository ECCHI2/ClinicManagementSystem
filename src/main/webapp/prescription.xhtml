<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Reçete Yönetimi | Medimanage</ui:define>

    <ui:define name="custom_css">
        <style>
            .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); background: white;}
            .header-bg { background: linear-gradient(135deg, #0f766e, #134e4a); color: white; border-radius: 15px 15px 0 0; padding: 20px; }
            .btn-save { background-color: #0f766e; color: white; border-radius: 10px; padding: 10px 25px; font-weight: bold; transition: all 0.3s;}
            .btn-save:hover { background-color: #134e4a; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);}
            .form-label { font-weight: 600; color: #334155; font-size: 0.9rem; }
            .form-control { border-radius: 10px; border: 1px solid #e2e8f0; }
            .form-control:focus { border-color: #0f766e; box-shadow: 0 0 0 0.25rem rgba(15, 118, 110, 0.25); }
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container mb-5">

            <p:growl id="globalGrowl" showDetail="true" life="6000">
                <p:autoUpdate />
            </p:growl>

            <h:panelGroup rendered="#{loginBean.admin}">
                <div class="card main-card mb-5">
                    <div class="header-bg">
                        <h4 class="mb-0"><i class="fas fa-pills me-2"></i> Yeni Reçete Yaz</h4>
                    </div>
                    <div class="card-body p-4">
                        <h:form id="prescriptionForm">
                            <h:inputHidden value="#{prescriptionBean.prescription.id}" />
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label">Bağlı Tıbbi Kayıt ID</label>
                                    <h:inputText value="#{prescriptionBean.prescription.medicalRecord.id}" styleClass="form-control" required="true" pt:placeholder="İlgili Tıbbi Kayıt ID'sini girin..." />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">İlaç Adı</label>
                                    <h:inputText value="#{prescriptionBean.prescription.medicineName}" styleClass="form-control" required="true" pt:placeholder="Örn: Parol" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Dozaj</label>
                                    <h:inputText value="#{prescriptionBean.prescription.dosage}" styleClass="form-control" required="true" pt:placeholder="Örn: 500mg" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Kullanım Sıklığı</label>
                                    <h:inputText value="#{prescriptionBean.prescription.frequency}" styleClass="form-control" pt:placeholder="Örn: Günde 3 defa tok karnına" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Kullanım Süresi</label>
                                    <h:inputText value="#{prescriptionBean.prescription.duration}" styleClass="form-control" pt:placeholder="Örn: 1 Hafta" />
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <h:commandButton action="#{prescriptionBean.save()}" value="Reçeteyi Kaydet" styleClass="btn btn-save">
                                        <f:ajax execute="@form" render="@form :prescriptionTableForm"/>
                                    </h:commandButton>
                                </div>
                            </div>
                        </h:form>
                    </div>
                </div>

                <h:form id="prescriptionTableForm">
                    <div class="card main-card p-4">
                        <h5 class="fw-bold mb-4" style="color: #0f766e;"><i class="fas fa-clipboard-list me-2"></i> Reçete Listesi</h5>
                        <div class="table-responsive">
                            <h:dataTable value="#{prescriptionBean.prescriptions}" var="p" styleClass="table table-hover align-middle">
                                <h:column><f:facet name="header">İlaç Adı</f:facet><span class="fw-bold">#{p.medicineName}</span></h:column>
                                <h:column><f:facet name="header">Dozaj</f:facet><span class="badge bg-secondary">#{p.dosage}</span></h:column>
                                <h:column><f:facet name="header">Sıklık</f:facet>#{p.frequency}</h:column>
                                <h:column><f:facet name="header">Süre</f:facet>#{p.duration}</h:column>
                                <h:column>
                                    <f:facet name="header">İşlemler</f:facet>
                                    <h:commandLink action="#{prescriptionBean.prepareEdit(p)}" styleClass="text-primary me-3 text-decoration-none">
                                        <i class="fas fa-edit fa-lg"></i>
                                    </h:commandLink>

                                    <p:commandLink action="#{prescriptionBean.delete(p)}" styleClass="text-danger text-decoration-none"
                                                   update="@form :globalGrowl"
                                                   onclick="if(!confirm('Silmek istediğinize emin misiniz?')) return false;">
                                        <i class="fas fa-trash-alt fa-lg"></i>
                                    </p:commandLink>
                                </h:column>
                            </h:dataTable>
                        </div>
                    </div>
                </h:form>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>
