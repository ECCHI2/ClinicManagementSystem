<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title><ui:insert name="title">Medimanage</ui:insert></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .custom-nav { background: linear-gradient(135deg, #0f766e, #134e4a) !important; }
    </style>
    <ui:insert name="custom_css"/>
</h:head>
<h:body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-nav mb-5 shadow-sm">
        <div class="container">
            <h:link outcome="index" class="navbar-brand fw-bold">
                <i class="fas fa-clinic-medical me-2"></i> MEDIMANAGE
            </h:link>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <h:panelGroup rendered="#{loginBean.admin}">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fas fa-notes-medical me-2"></i> Tıbbi İşlemler
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li>
                                    <h:link outcome="record" styleClass="dropdown-item">
                                        <i class="fas fa-file-medical me-2"></i> Tıbbi Kayıtlar
                                    </h:link>
                                </li>
                                <li>
                                    <h:link outcome="prescription" styleClass="dropdown-item">
                                        <i class="fas fa-pills me-2"></i> Reçeteler
                                    </h:link>
                                </li>
                                <li>
                                    <h:link outcome="schedule" styleClass="dropdown-item">
                                        <i class="fas fa-clock me-2"></i> Çalışma Saatleri
                                    </h:link>
                                </li>
                                <li>
                                    <h:link outcome="medicine" styleClass="dropdown-item">
                                        <i class="fas fa-boxes me-2"></i> İlaç Stok
                                    </h:link>
                                </li>
                                <li>
                                    <h:link outcome="invoice" styleClass="dropdown-item">
                                        <i class="fas fa-file-invoice-dollar me-2"></i> Fatura Yönetimi
                                    </h:link>
                                </li>
                            </ul>
                        </li>
                    </h:panelGroup>
                </ul>

                <div class="d-flex align-items-center mt-2 mt-lg-0">
                    <h:link outcome="index" styleClass="btn btn-outline-light btn-sm me-3 rounded-pill px-3">
                        <i class="fas fa-home me-1"></i> Ana Sayfa
                    </h:link>

                    <h:panelGroup rendered="#{loginBean.currentUser != null}">
                        <span class="text-white me-3 small">
                            <i class="fas fa-user-circle me-1"></i>
                            <b>#{loginBean.currentUser.username}</b>
                            <span class="badge bg-light text-dark ms-2" style="font-size: 0.7rem;">
                                #{loginBean.currentUser.role}
                            </span>
                        </span>
                        <h:form style="display:inline;">
                            <h:commandLink action="#{loginBean.logout()}" styleClass="btn btn-danger btn-sm rounded-pill px-3">
                                <i class="fas fa-sign-out-alt"></i>
                            </h:commandLink>
                        </h:form>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{loginBean.currentUser == null}">
                        <h:link outcome="login" styleClass="btn btn-light btn-sm rounded-pill px-3">
                            Giriş Yap
                        </h:link>
                    </h:panelGroup>
                </div>
            </div>
        </div>
    </nav>

    <ui:insert name="content"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
