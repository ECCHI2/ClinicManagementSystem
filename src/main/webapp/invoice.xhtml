<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Fatura Yönetimi | Medimanage</ui:define>

    <ui:define name="custom_css">
        <style>
            .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); background: white;}
            .header-bg { background: linear-gradient(135deg, #0f766e, #134e4a); color: white; border-radius: 15px 15px 0 0; padding: 20px; }
            .btn-save { background-color: #0f766e; color: white; border-radius: 10px; padding: 10px 25px; font-weight: bold; transition: all 0.3s;}
            .btn-save:hover { background-color: #134e4a; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(15, 118, 110, 0.3);}
            .form-label { font-weight: 600; color: #334155; font-size: 0.9rem; }
            .form-control, .form-select { border-radius: 10px; border: 1px solid #e2e8f0; }
            .form-control:focus, .form-select:focus { border-color: #0f766e; box-shadow: 0 0 0 0.25rem rgba(15, 118, 110, 0.25); }
            /* تنسيق رسائل التنبيه الموحد لكامل النظام ليعرض التفاصيل */
            .messages { list-style-type: none; padding: 0; margin-bottom: 20px; }
            .messages li { padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
            .messages .info { background-color: #d1ecf1; color: #0c5460; border-left: 5px solid #0c5460; }
            .messages .error { background-color: #f8d7da; color: #721c24; border-left: 5px solid #721c24; }
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container mb-5">

            <h:messages id="globalMessages" styleClass="messages" infoClass="info" errorClass="error" globalOnly="false" showDetail="true" showSummary="true" />

            <h:panelGroup rendered="#{loginBean.admin}">
                <div class="card main-card mb-5">
                    <div class="header-bg">
                        <h4 class="mb-0"><i class="fas fa-file-invoice-dollar me-2"></i> Yeni Fatura Oluştur</h4>
                    </div>
                    <div class="card-body p-4">
                        <h:form id="invoiceForm">
                            <h:inputHidden value="#{invoiceBean.invoice.id}" />
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Hasta Seçin</label>
                                    <h:selectOneMenu value="#{invoiceBean.patientId}" styleClass="form-select" required="true">
                                        <f:selectItem itemLabel="Hasta Seçiniz..." itemValue="#{null}" noSelectionOption="true"/>
                                        <f:selectItems value="#{invoiceBean.allPatients}" var="p"
                                                       itemLabel="#{p.firstName} #{p.lastName} (TC: #{p.tcNo})" itemValue="#{p.id}"/>
                                    </h:selectOneMenu>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">İlişkili Randevu (Opsiyonel)</label>
                                    <h:selectOneMenu value="#{invoiceBean.appointmentId}" styleClass="form-select">
                                        <f:selectItem itemLabel="Randevu Yok / Bağımsız" itemValue="#{null}"/>
                                        <f:selectItems value="#{invoiceBean.allAppointments}" var="a"
                                                       itemLabel="Randevu ##{a.id} - Dr. #{a.doctor.lastName} (#{a.appointmentDate})" itemValue="#{a.id}"/>
                                    </h:selectOneMenu>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Fatura Tutarı (TL)</label>
                                    <h:inputText value="#{invoiceBean.invoice.amount}" styleClass="form-control" required="true" pt:type="number" pt:step="0.01" pt:placeholder="0.00" />
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Fatura Tarihi</label>
                                    <h:inputText value="#{invoiceBean.invoice.invoiceDate}" styleClass="form-control" pt:type="date" required="true">
                                        <f:convertDateTime pattern="yyyy-MM-dd" />
                                    </h:inputText>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Ödeme Durumu</label>
                                    <h:selectOneMenu value="#{invoiceBean.invoice.status}" styleClass="form-select" required="true">
                                        <f:selectItem itemLabel="Bekliyor" itemValue="Bekliyor" />
                                        <f:selectItem itemLabel="Ödendi" itemValue="Ödendi" />
                                    </h:selectOneMenu>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">İşlem / Hizmet Açıklaması</label>
                                    <h:inputTextarea value="#{invoiceBean.invoice.description}" styleClass="form-control" rows="2" pt:placeholder="Muayene bedeli, tahlil ücreti vb..." />
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <h:commandButton action="#{invoiceBean.save()}" value="Faturayı Kaydet" styleClass="btn btn-save">
                                        <f:ajax execute="@form" render="@form :invoiceTableForm :globalMessages" />
                                    </h:commandButton>
                                </div>
                            </div>
                        </h:form>
                    </div>
                </div>

                <h:form id="invoiceTableForm">
                    <div class="card main-card p-4">
                        <h5 class="fw-bold mb-4" style="color: #0f766e;"><i class="fas fa-list-alt me-2"></i> Faturalar Listesi</h5>
                        <div class="table-responsive">
                            <h:dataTable value="#{invoiceBean.invoices}" var="i" styleClass="table table-hover align-middle">
                                <h:column><f:facet name="header">Fatura ID</f:facet><span class="badge bg-light text-dark">##{i.id}</span></h:column>
                                <h:column><f:facet name="header">Hasta</f:facet><span class="fw-bold">#{i.patient.firstName} #{i.patient.lastName}</span></h:column>
                                <h:column><f:facet name="header">Tutar</f:facet><span class="fw-bold text-success">#{i.amount} TL</span></h:column>
                                <h:column>
                                    <f:facet name="header">Tarih</f:facet>
                                    <h:outputText value="#{i.invoiceDate}"><f:convertDateTime pattern="dd/MM/yyyy" /></h:outputText>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">Durum</f:facet>
                                    <span class="badge #{i.status == 'Ödendi' ? 'bg-success' : 'bg-warning text-dark'}">#{i.status}</span>
                                </h:column>
                                <h:column><f:facet name="header">Açıklama</f:facet>#{i.description}</h:column>
                                <h:column>
                                    <f:facet name="header">İşlemler</f:facet>
                                    <h:commandLink action="#{invoiceBean.prepareEdit(i)}" styleClass="text-primary me-3 text-decoration-none">
                                        <i class="fas fa-edit fa-lg"></i>
                                        <f:ajax render=":invoiceForm" />
                                    </h:commandLink>

                                    <h:commandLink action="#{invoiceBean.delete(i)}" styleClass="text-danger text-decoration-none"
                                                   onclick="if(!confirm('Bu faturayı silmek istediğinize emin misiniz?')) return false;">
                                        <i class="fas fa-trash-alt fa-lg"></i>
                                        <f:ajax render="@form :globalMessages" />
                                    </h:commandLink>
                                </h:column>
                            </h:dataTable>
                        </div>
                    </div>
                </h:form>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>
