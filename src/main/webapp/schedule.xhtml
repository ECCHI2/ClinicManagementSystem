<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Doktor Çalışma Saatleri | Medimanage</ui:define>

    <ui:define name="custom_css">
        <style>
            .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); background: white;}
            .header-bg { background: linear-gradient(135deg, #14b8a6, #0d9488); color: white; border-radius: 15px 15px 0 0; padding: 20px; }
            .btn-save { background-color: #14b8a6; color: white; border-radius: 10px; padding: 10px 25px; font-weight: bold; transition: all 0.3s;}
            .btn-save:hover { background-color: #0d9488; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(20, 184, 166, 0.3);}
            .form-label { font-weight: 600; color: #334155; font-size: 0.9rem; }
            .form-control, .form-select { border-radius: 10px; border: 1px solid #e2e8f0; }
            .form-control:focus, .form-select:focus { border-color: #14b8a6; box-shadow: 0 0 0 0.25rem rgba(20, 184, 166, 0.25); }
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container mb-5">

            <p:growl id="globalGrowl" showDetail="true" life="6000">
                <p:autoUpdate />
            </p:growl>

            <h:panelGroup rendered="#{loginBean.admin}">
                <div class="card main-card mb-5">
                    <div class="header-bg">
                        <h4 class="mb-0"><i class="fas fa-clock me-2"></i> Çalışma Saati Planla</h4>
                    </div>
                    <div class="card-body p-4">
                        <h:form id="scheduleForm">
                            <h:inputHidden value="#{doctorScheduleBean.schedule.id}" />
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Doktor ID</label>
                                    <h:inputText value="#{doctorScheduleBean.schedule.doctor.id}" styleClass="form-control" required="true" pt:placeholder="Doktorun ID'si..." />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Gün</label>
                                    <h:selectOneMenu value="#{doctorScheduleBean.schedule.dayOfWeek}" styleClass="form-select" required="true">
                                        <f:selectItem itemLabel="Gün Seçin..." itemValue="" />
                                        <f:selectItem itemLabel="Pazartesi" itemValue="Pazartesi" />
                                        <f:selectItem itemLabel="Salı" itemValue="Salı" />
                                        <f:selectItem itemLabel="Çarşamba" itemValue="Çarşamba" />
                                        <f:selectItem itemLabel="Perşembe" itemValue="Perşembe" />
                                        <f:selectItem itemLabel="Cuma" itemValue="Cuma" />
                                        <f:selectItem itemLabel="Cumartesi" itemValue="Cumartesi" />
                                        <f:selectItem itemLabel="Pazar" itemValue="Pazar" />
                                    </h:selectOneMenu>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Başlangıç Saati</label>
                                    <h:inputText value="#{doctorScheduleBean.schedule.startTime}" styleClass="form-control" pt:type="time">
                                        <f:convertDateTime pattern="HH:mm" />
                                    </h:inputText>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Bitiş Saati</label>
                                    <h:inputText value="#{doctorScheduleBean.schedule.endTime}" styleClass="form-control" pt:type="time">
                                        <f:convertDateTime pattern="HH:mm" />
                                    </h:inputText>
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <h:commandButton action="#{doctorScheduleBean.save()}" value="Saatleri Kaydet" styleClass="btn btn-save">
                                        <f:ajax execute="@form" render="@form :scheduleTableForm"/>
                                    </h:commandButton>
                                </div>
                            </div>
                        </h:form>
                    </div>
                </div>

                <h:form id="scheduleTableForm">
                    <div class="card main-card p-4">
                        <h5 class="fw-bold mb-4" style="color: #14b8a6;"><i class="fas fa-calendar-alt me-2"></i> Planlanmış Mesai Saatleri</h5>
                        <div class="table-responsive">
                            <h:dataTable value="#{doctorScheduleBean.schedules}" var="s" styleClass="table table-hover align-middle">
                                <h:column><f:facet name="header">Gün</f:facet><span class="fw-bold">#{s.dayOfWeek}</span></h:column>
                                <h:column>
                                    <f:facet name="header">Başlangıç</f:facet>
                                    <h:outputText value="#{s.startTime}">
                                        <f:convertDateTime pattern="HH:mm" />
                                    </h:outputText>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">Bitiş</f:facet>
                                    <h:outputText value="#{s.endTime}">
                                        <f:convertDateTime pattern="HH:mm" />
                                    </h:outputText>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">İşlemler</f:facet>
                                    <h:commandLink action="#{doctorScheduleBean.prepareEdit(s)}" styleClass="text-primary me-3 text-decoration-none">
                                        <i class="fas fa-edit fa-lg"></i>
                                    </h:commandLink>

                                    <p:commandLink action="#{doctorScheduleBean.delete(s)}" styleClass="text-danger text-decoration-none"
                                                   update="@form :globalGrowl"
                                                   onclick="if(!confirm('Mesai saatini silmek istediğinize emin misiniz?')) return false;">
                                        <i class="fas fa-trash-alt fa-lg"></i>
                                    </p:commandLink>
                                </h:column>
                            </h:dataTable>
                        </div>
                    </div>
                </h:form>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>
