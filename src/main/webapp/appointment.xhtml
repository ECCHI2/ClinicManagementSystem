<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Randevu Sistemi | Medimanage</ui:define>

    <ui:define name="custom_css">
        <style>
            body { background-color: #f1f5f9 !important; }
            .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; overflow: hidden; }
            .appointment-header { background: linear-gradient(135deg, #0d9488, #14b8a6); color: white; padding: 25px; border-radius: 20px 20px 0 0; }
            .form-label { color: #334155; font-weight: 600; font-size: 0.9rem; }
            .form-select, .form-control { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; transition: all 0.3s; }
            .form-select:focus, .form-control:focus { border-color: #14b8a6; box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1); }
            .btn-appointment { background-color: #0d9488; color: white; border: none; padding: 12px 40px; border-radius: 12px; font-weight: bold; transition: all 0.3s; width: 100%; }
            .btn-appointment:hover { background-color: #0f766e; transform: translateY(-2px); color: white; box-shadow: 0 5px 15px rgba(13, 148, 136, 0.3); }
            .table-custom { border-radius: 15px; overflow: hidden; border: 1px solid #f1f5f9; }
            .table-custom thead { background-color: #f8fafc; }

            /* تنسيق رسائل التنبيه الموحد */
            .messages { list-style-type: none; padding: 0; margin-bottom: 20px; }
            .messages li { padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
            .messages .info { background-color: #d1ecf1; color: #0c5460; border-left: 5px solid #0c5460; }
            .messages .error { background-color: #f8d7da; color: #721c24; border-left: 5px solid #721c24; }
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container mb-5">

            <h:messages id="globalMessages" styleClass="messages" infoClass="info" errorClass="error" globalOnly="false" showDetail="true" showSummary="true" />

            <div class="card main-card">
                <div class="appointment-header text-center">
                    <h3 class="mb-0"><i class="fas fa-calendar-plus me-2"></i> Yeni Randevu Oluştur</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    <h:form id="appointmentForm">
                        <h:inputHidden value="#{appointmentBean.appointment.id}" />

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Doctor Seçin</label>
                                <h:selectOneMenu value="#{appointmentBean.appointment.doctor}" styleClass="form-select" converter="genericConverter" required="true">
                                    <f:selectItem itemLabel="Doctor Seçiniz..." itemValue="#{null}"/>
                                    <f:selectItems value="#{appointmentBean.allDoctors}" var="d"
                                                   itemLabel="Dr. #{d.firstName} #{d.lastName}" itemValue="#{d}"/>
                                </h:selectOneMenu>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Hasta Seçin</label>
                                <h:selectOneMenu value="#{appointmentBean.appointment.patient}" styleClass="form-select" converter="genericConverter" required="true">
                                    <f:selectItem itemLabel="Hasta Seçiniz..." itemValue="#{null}"/>
                                    <f:selectItems value="#{appointmentBean.allPatients}" var="p"
                                                   itemLabel="#{p.firstName} #{p.lastName} (TC: #{p.tcNo})"
                                                   itemValue="#{p}"/>
                                </h:selectOneMenu>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notlar</label>
                                <h:inputTextarea value="#{appointmentBean.appointment.note}" styleClass="form-control" rows="3" pt:placeholder="Randevu notlarınızı buraya yazın..." />
                            </div>

                            <div class="col-md-6 mt-3">
                                <label class="form-label">Randevu Tarihi ve Saati</label>
                                <h:inputText value="#{appointmentBean.appointment.appointmentDate}"
                                             styleClass="form-control"
                                             pt:type="datetime-local"
                                             pt:max="2099-12-31T23:59"
                                             required="true">
                                    <f:convertDateTime pattern="yyyy-MM-dd'T'HH:mm" timeZone="GMT+3" />
                                </h:inputText>
                            </div>

                            <h:panelGroup layout="block" class="col-md-6 mt-3" rendered="#{appointmentBean.appointment.id != null}">
                                <label class="form-label">Randevu Durumu (Status)</label>
                                <h:selectOneMenu value="#{appointmentBean.appointment.status}" styleClass="form-select">
                                    <f:selectItems value="#{appointmentBean.statuses}" var="status"
                                                   itemLabel="#{status.label}" itemValue="#{status}"/>
                                </h:selectOneMenu>
                            </h:panelGroup>

                            <div class="col-md-4 offset-md-4 mt-5">
                                <h:commandButton action="#{appointmentBean.save()}" value="Randevuyu Kaydet" styleClass="btn btn-appointment">
                                    <f:ajax execute="@form" render="@form :listForm :globalMessages"/>
                                </h:commandButton>
                            </div>
                        </div>
                    </h:form>

                    <hr class="my-5" style="border-top: 2px dashed #e2e8f0;" />

                    <h:form id="listForm">
                        <h5 class="mb-4 fw-bold text-dark"><i class="fas fa-clipboard-list text-teal me-2" style="color: #14b8a6;"></i> Güncel Randevu Listesi</h5>
                        <div class="table-responsive">
                            <h:dataTable value="#{appointmentBean.appointmentList}" var="r" styleClass="table table-hover table-custom align-middle">
                                <h:column><f:facet name="header" class="p-3">ID</f:facet>
                                    <span class="badge bg-light text-dark">##{r.id}</span>
                                </h:column>
                                <h:column><f:facet name="header" class="p-3">Doktor</f:facet>Dr. #{r.doctor.firstName} #{r.doctor.lastName}</h:column>
                                <h:column>
                                    <f:facet name="header" class="p-3">Hasta</f:facet>
                                    <div class="d-flex flex-column">
                                        <span class="fw-bold">#{r.patient.firstName} #{r.patient.lastName}</span>
                                        <small class="text-muted" style="font-size: 0.75rem;">TC: #{r.patient.tcNo}</small>
                                    </div>
                                </h:column>
                                <h:column>
                                    <f:facet name="header" class="p-3">Randevu Zamanı</f:facet>
                                    <h:outputText value="#{r.appointmentDate}">
                                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="GMT+3" />
                                    </h:outputText>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">Durum</f:facet>
                                    <h:panelGroup rendered="#{r.status == 'PENDING'}">
                                        <span class="badge bg-warning text-dark px-3 rounded-pill">Bekliyor</span>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{r.status == 'APPROVED'}">
                                        <span class="badge bg-info px-3 rounded-pill">Onaylandı</span>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{r.status == 'COMPLETED'}">
                                        <span class="badge bg-success px-3 rounded-pill">Tamamlandı</span>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{r.status == 'CANCELLED'}">
                                        <span class="badge bg-danger px-3 rounded-pill">İptal Edildi</span>
                                    </h:panelGroup>
                                </h:column>
                                <h:column>
                                    <f:facet name="header" class="p-3">İşlemler</f:facet>
                                    <div class="d-flex justify-content-center border-0">
                                        <h:commandLink action="#{appointmentBean.prepareEdit(r)}"
                                                       styleClass="text-primary me-3 text-decoration-none">
                                            <i class="fas fa-edit fa-lg"></i>
                                            <f:ajax render=":appointmentForm" />
                                        </h:commandLink>

                                        <h:commandLink action="#{appointmentBean.delete(r)}"
                                                       styleClass="text-danger text-decoration-none"
                                                       onclick="if(!confirm('Bu randevuyu silmek istediğinize emin misiniz?')) return false;">
                                            <i class="fas fa-trash-alt fa-lg"></i>
                                            <f:ajax render="@form :globalMessages" />
                                        </h:commandLink>
                                    </div>
                                </h:column>
                            </h:dataTable>
                        </div>
                    </h:form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
