<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Medimanage | Hasta Kayıt</ui:define>

    <ui:define name="custom_css">
        <style>
            .table thead th { background-color: #f8fafc; color: #0d9488; border-bottom: 2px solid #0d9488; }
            .form-control:focus { border-color: #14b8a6; box-shadow: 0 0 0 0.25rem rgba(20, 184, 166, 0.25); }
            .custom-calendar input { display: block; width: 100%; padding: 0.375rem 0.75rem; font-size: 1rem; border: 1px solid #dee2e6; border-radius: 0.375rem; }
            .ui-datepicker { font-family: 'Segoe UI', sans-serif; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
            .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; background: white;}
        </style>
    </ui:define>

    <ui:define name="content">
        <div class="container">
            <div class="main-card mb-5">
                <h3 class="fw-bold mb-4 text-dark">
                    <i class="fas fa-user-plus me-2" style="color: #0d9488;"></i> Hasta Kayıt ve Yönetimi
                </h3>
                <h:form id="addPatientForm" styleClass="form-section shadow-sm p-4 mb-4 rounded border">
                    <h:inputHidden value="#{patientBean.patient.id}" />
                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>

                    <h5 class="fw-bold mb-3 small text-uppercase text-muted">Yeni Hasta Bilgileri</h5>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">TC Kimlik No</label>
                            <h:inputText value="#{patientBean.patient.tcNo}" required="true" maxlength="11" styleClass="form-control" pt:placeholder="11 Haneli">
                                <f:validateRegex pattern="^[0-9]{11}$" />
                            </h:inputText>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Ad</label>
                            <h:inputText value="#{patientBean.patient.firstName}" required="true" styleClass="form-control" />
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Soyad</label>
                            <h:inputText value="#{patientBean.patient.lastName}" required="true" styleClass="form-control" />
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Telefon</label>
                            <h:inputText value="#{patientBean.patient.phone}" required="true" maxlength="11" styleClass="form-control" pt:placeholder="05xx..." />
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold" style="color: #0d9488;">Doğum Tarihi</label>
                            <h:inputText value="#{patientBean.patient.birthDate}"
                                         styleClass="form-control"
                                         pt:type="date"
                                         pt:max="9999-12-31"
                                         oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10)"
                                         required="true"
                                         requiredMessage="Doğum tarihi zorunludur!">
                                <f:convertDateTime pattern="yyyy-MM-dd" />
                            </h:inputText>
                        </div>

                        <div class="col-md-9 text-end align-self-end">
                            <h:commandButton action="#{patientBean.save()}"
                                             value="Hastayı Sisteme Kaydet"
                                             styleClass="btn text-white fw-bold px-5 py-2 shadow-sm"
                                             style="background: linear-gradient(135deg, #0d9488, #14b8a6); border: none; border-radius: 10px;">
                                <f:ajax execute="@form" render="@form :patientList :messages" />
                            </h:commandButton>
                        </div>
                    </div>
                </h:form>

                <div class="table-responsive">
                    <h:form id="patientList">
                        <h:dataTable value="#{patientBean.getPatients()}" var="p" styleClass="table table-hover align-middle">
                            <h:column><f:facet name="header">TC No</f:facet>#{p.tcNo}</h:column>
                            <h:column><f:facet name="header">Hasta Adı Soyadı</f:facet><span class="fw-bold">#{p.firstName} #{p.lastName}</span></h:column>
                            <h:column><f:facet name="header">Telefon</f:facet>#{p.phone}</h:column>

                            <h:column>
                                <f:facet name="header">Yaş</f:facet>
                                <span class="badge bg-info text-dark">#{p.age}</span>
                            </h:column>

                            <h:column>
                                <f:facet name="header">İşlemler</f:facet>
                                <h:commandLink action="#{patientBean.prepareEdit(p)}" styleClass="text-primary me-3">
                                    <i class="fas fa-edit"></i>
                                </h:commandLink>
                                <h:commandLink action="#{patientBean.delete(p)}" styleClass="text-danger" onclick="return confirm('Silinsin mi?')">
                                    <i class="fas fa-trash-alt"></i>
                                </h:commandLink>
                            </h:column>
                        </h:dataTable>
                    </h:form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
